<!DOCTYPE html>
<html lang="en">

	<head>

		<meta charset="UTF-8">
			<meta name="viewport" content="width=device-width, initial-scale=1.0">

				<title>Games</title>

				<link rel="icon" type="image/jpg" href="Images/Logo.jpg">
				</link>


				<style>
					:root{
					--bg:#0f172a;
					--card:#1e293b;
					--text:#f8fafc;
					--muted:#cbd5e1;
					--accent:#3b82f6;
					}

					*{box-sizing:border-box;margin:0;padding:0}

					body{
					font-family:Arial,sans-serif;
					color:white;
					background-image:url("Images/IMG_7185.png");
					background-size: cover;
					background-position: center;
					background-repeat: no-repeat;
					background-attachment: fixed;


					}

					header{
					position:sticky;
					top:0;
					background:#111827;
					border-bottom:1px solid #334155;
					z-index:100;
					}

					nav{
					max-width:1100px;
					margin:auto;
					display:flex;
					justify-content:space-between;
					align-items:center;
					padding:15px 20px;
					}

					.logo{
					display:flex;
					align-items:center;
					gap:10px;
					text-decoration:none;
					color:white;
					font-weight:bold;
					font-size:28px;
					cursor:pointer;
					}

					.logo:hover{
					opacity:0.9;

					}

					.menu{
					display:flex;
					gap:20px;
					margin-left: 400px;
					}

					.menu a{
					color:var(--text);
					text-decoration:none;
					font-weight:bold;
					}

					.menu a:hover{
					color:var(--accent);
					}

					.hero{
					max-width:1100px;
					margin:auto;
					text-align:center;
					padding:80px 20px;
					}

					.hero h1{
					font-size:48px;
					margin-bottom:20px;
					}

					.hero p{
					color:var(--muted);
					font-size:20px;
					margin-bottom:30px;
					}

					.btn{
					display:inline-block;
					background:var(--accent);
					color:white;
					padding:14px 24px;
					border-radius:10px;
					text-decoration:none;
					font-weight:bold;
					}

					section{
					max-width:1100px;
					margin:auto;
					padding:60px 20px;
					}

					h2{
					margin-bottom:20px;
					font-size:32px;
					}

					.cards{
					display:grid;
					grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
					gap:20px;
					}

					.card{
					background:var(--card);
					border-radius:16px;
					overflow:hidden;
					border:1px solid #334155;
					}

					.card img{
					width:100%;
					height:160px;
					object-fit:cover;
					}

					.card-content{
					padding:20px;
					}

					.card h3{
					margin-bottom:10px;
					}

					.card p{
					color:var(--muted);
					margin-bottom:15px;
					}

					footer{
					text-align:center;
					padding:30px;
					border-top:1px solid #334155;
					color:var(--muted);
					}

					@media(max-width:700px){
					nav{
					flex-direction:column;
					gap:12px;
					}

					.menu{
					flex-wrap:wrap;
					justify-content:center;
					}

					.hero h1{
					font-size:34px;
					}
					}
					.game-image {
					width: 220px;      /* Ширина */
					height: auto;      /* Высота подстроится автоматически */
					border-radius: 10px;
					display: block;
					margin: -2 auto;    /* По центру */
					}
					.games {
					padding: 70px 0;
					}

					/* Белая/тёмная рамка по центру */
					.games-container {
					width: 90%;
					max-width: 1200px;
					margin: 0 auto;
					background: #1d1d1d;
					border-radius: 20px;
					padding: 40px;
					box-shadow: 0 10px 30px rgba(0,0,0,.35);
					}

					.games-container h2 {
					color: white;
					text-align: center;
					margin-bottom: 40px;
					}

					.games-grid {
					display: flex;
					gap: 25px;
					justify-content: center;
					flex-wrap: wrap;
					}

					.game-card {
					width: 260px;
					background: #2a2a2a;
					border-radius: 15px;
					overflow: hidden;
					transition: .3s;
					}

					.game-card:hover {
					transform: translateY(-8px);
					}

					.game-card img {
					width: 100%;
					height: 300px;
					object-fit: cover;
					}

					.game-card h3 {
					color: white;
					text-align: center;
					margin: 15px 0 5px;
					}

					.game-card p {
					color: #ccc;
					text-align: center;
					padding-bottom: 20px;
					}
					.register-box {
						position: absolute;
						top: 20px;
						right: 20px;

						display: flex;
						gap: 10px;
						align-items: center;
						}
						#signUpBtn{
						background: transparent;
						color: white;
						border: 1px solid #6c4cff;
						border-radius: 8px;
						padding: 8px 14px;
						cursor: pointer;

						display: flex;
						align-items: center;
						gap: 8px;

						transition: 0.3s;
						}

						#signUpBtn:hover{
						background: #6c4cff;
						}
						#signUpBtn{
						background:#1f1f35;
						color:white;
						border:1px solid #6c4cff;
						border-radius:8px;
						padding:8px 15px;

						display:flex;
						align-items:center;
						gap:8px;

						cursor:pointer;
						transition:0.3s;
					}

					#signUpBtn:hover{
						background:#6c4cff;
					}

					#signUpBtn img{
						width:32px;
						height:32px;
						border-radius:50%;
					}
					.profile-menu{
					position:absolute;
					top:70px;
					right:20px;

					background:#1f1f35;
					border:1px solid #6c4cff;
					border-radius:10px;

					width:180px;

					display:none;

					overflow:hidden;
					box-shadow:0 10px 25px rgba(0,0,0,.4);
				}

				.profile-menu a{
					display:block;
					padding:12px 15px;
					color:white;
					text-decoration:none;
				}

				.profile-menu a:hover{
					background:#6c4cff;
				}
				.profile-box{
				position:relative;
				display:inline-block;
			}

				#signUpBtn{

					display:flex;
					align-items:center;
					gap:10px;

					background:#20202b;

					color:white;

					border:none;

					border-radius:12px;

					padding:10px 15px;

					cursor:pointer;

					transition:.25s;
				}

				#signUpBtn:hover{

					background:#2e2e42;

				}

				#signUpBtn img{

					width:38px;

					height:38px;

					border-radius:50%;

				}

				.profile-menu{

					display:none;

					position:absolute;

					top:60px;

					right:0;

					width:230px;

					background:#1d1d1d;

					border-radius:15px;

					overflow:hidden;

					box-shadow:0 12px 35px rgba(0,0,0,.45);

				}

				.profile-menu a{

					display:block;

					padding:14px 18px;

					color:white;

					text-decoration:none;

					transition:.25s;

				}

				.profile-menu a:hover{

					background:#6c4cff;

				}

				.profile-menu hr{

					border:none;

					border-top:1px solid #333;

				}
				.show{

				display:block;

			}


				</style>
			</meta>
		</meta>
	</head>

	<body>

		<header>
			<nav>
				<a href="index.htmll" class="logo">
					🎮 Iron Fox Studio

				</a>


				<div class="menu">

					<a href="HTMLPage2.html">Games</a>
					<a href="About.html">About</a>
					<a href="Contacts.html">Contacts</a>
				</div>
					<div class="profile-box">

				<button id="signUpBtn" onclick="signUp()">
					Sign Up
				</button>

				<div id="profileMenu" class="profile-menu">

					<a href="settings.html">⚙ Settings</a>

					<hr>

					<a href="#" id="logoutBtn">🚪 Sign Out</a>

				</div>
			</nav>
		</header>

		<section class="games">
			<div class="games-container">

				<div class="games-grid">

					<div class="game-card">
						<a href="Samurai Survivors.html">
							<img src="images/IMG_6988.png" alt="IMG_6988">
							</img>
						</a>

						<h3>Samurai Survivors</h3>
							<p>Action game</p>
						
						</div>
					<div class="game-card">
						<img src="images/Shadow Knight.jpg" alt="Shadow Knight">
							<h3>Shadow Knight</h3>
							<p>Action game</p>
						</img>
						</div>

					<div class="game-card">
						<img src="images/Puzzle.jpg" alt="Puzzle">
							<h3>Collect Puzzle</h3>
							<p>Puzzle game</p>
						</img>
						</div>



				</div>
			</div>
		</section>
		
	

	

		


			<footer>
			© 2026 Iron Fox Studio
		</footer>

	</body>
	<script type="module" src="Firebase.js"></script>
</html>
