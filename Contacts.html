<!DOCTYPE html>
<html lang="en">

	<head>

		<meta charset="UTF-8">
			<meta name="viewport" content="width=device-width, initial-scale=1.0">

				<title>Contacts</title>




				<link rel="icon" type="image/jpg" href="Images/Logo.jpg">
				</link>



				<style>
					:root{
					--bg:#0f172a;
					--card:#1e293b;
					--text:#f8fafc;
					--muted:#cbd5e1;
					--accent:#3b82f6;
					}

					*{box-sizing:border-box;margin:0;padding:0}

					body{
					font-family:Arial,sans-serif;
					color:white;
					background-image:url("Images/IMG_7185.png");
					background-size: cover;
					background-position: center;
					background-repeat: no-repeat;
					background-attachment: fixed;


					}

					header{
					position:sticky;
					top:0;
					background:#111827;
					border-bottom:1px solid #334155;
					z-index:100;
					}

					nav{
					max-width:1100px;
					margin:auto;
					display:flex;
					justify-content:space-between;
					align-items:center;
					padding:15px 20px;
					}

					.logo{
					display:flex;
					align-items:center;
					gap:10px;
					text-decoration:none;
					color:white;
					font-weight:bold;
					font-size:28px;
					cursor:pointer;
					}

					.logo:hover{
					opacity:0.9;

					}

					.menu{
					display:flex;
					gap:20px;
					margin-left: 400px;
					}

					.menu a{
					color:var(--text);
					text-decoration:none;
					font-weight:bold;
					}

					.menu a:hover{
					color:var(--accent);
					}

					.hero{
					max-width:1100px;
					margin:auto;
					text-align:center;
					padding:80px 20px;
					}

					.hero h1{
					font-size:48px;
					margin-bottom:20px;
					}

					.hero p{
					color:var(--muted);
					font-size:20px;
					margin-bottom:30px;
					}

					.btn{
					display:inline-block;
					background:var(--accent);
					color:white;
					padding:14px 24px;
					border-radius:10px;
					text-decoration:none;
					font-weight:bold;
					}

					section{
					max-width:1100px;
					margin:auto;
					padding:60px 20px;
					}

					h2{
					margin-bottom:20px;
					font-size:32px;
					}

					.cards{
					display:grid;
					grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
					gap:20px;
					}

					.card{
					background:var(--card);
					border-radius:16px;
					overflow:hidden;
					border:1px solid #334155;
					}

					.card img{
					width:100%;
					height:160px;
					object-fit:cover;
					}

					.card-content{
					padding:20px;
					}

					.card h3{
					margin-bottom:10px;
					}

					.card p{
					color:var(--muted);
					margin-bottom:15px;
					}

					footer{
					text-align:center;
					padding:30px;
					border-top:1px solid #334155;
					color:var(--muted);
					}
					footer {
					margin-top: 150px;
					}

					@media(max-width:700px){
					nav{
					flex-direction:column;
					gap:12px;
					}

					.menu{
					flex-wrap:wrap;
					justify-content:center;
					}

					.hero h1{
					font-size:34px;
					}
					}
					.project-card{
					width:300px;
					background:#1d2330;
					border-radius:10px;
					overflow:hidden;
					padding-bottom:20px;
					}

					.project-card img{
					width:100%;
					height:180px;
					object-fit:cover;
					}

					.project-card h3{
					margin:15px;
					}

					.project-card p{
					margin:15px;
					}

					.project-btn{
					display:inline-block;
					margin:15px;
					padding:10px 20px;
					background:#6c4cff;
					color:white;
					text-decoration:none;
					border-radius:6px;
					}
					.contacts {
					text-align: center;
					padding: 70px 40px;
					}

					.contacts h2 {
					font-size: 42px;
					color: white;
					margin-bottom: 100px;
					}

					.contact-container {
					display: flex;
					justify-content: center;
					gap: 40px;
					flex-wrap: wrap;
					}

					.contact-card {
					width: 320px;
					background: #1d1d1d;
					border-radius: 18px;
					padding: 35px 25px;
					box-shadow: 0 8px 25px rgba(0,0,0,0.35);
					transition: 0.3s;
					}

					.contact-card:hover {
					transform: translateY(-10px);
					box-shadow: 0 12px 35px rgba(255,255,255,0.15);
					}

					.contact-card h3 {
					color: #f6c84c;
					font-size: 28px;
					margin-bottom: 20px;
					}

					.contact-card p {
					color: white;
					margin-bottom: 25px;
					font-size: 18px;
					}

					.contact-btn {
					display: inline-block;
					padding: 12px 25px;
					background: #6c4cff;
					color: white;
					text-decoration: none;
					border-radius: 8px;
					transition: 0.3s;
					}

					.contact-btn:hover {
					background: #856dff;
					}
					.register-box {
						position: absolute;
						top: 20px;
						right: 20px;

						display: flex;
						gap: 10px;
						align-items: center;
						}
						#signUpBtn{
						background: transparent;
						color: white;
						border: 1px solid #6c4cff;
						border-radius: 8px;
						padding: 8px 14px;
						cursor: pointer;

						display: flex;
						align-items: center;
						gap: 8px;

						transition: 0.3s;
						}

						#signUpBtn:hover{
						background: #6c4cff;
						}
						#signUpBtn{
						background:#1f1f35;
						color:white;
						border:1px solid #6c4cff;
						border-radius:8px;
						padding:8px 15px;

						display:flex;
						align-items:center;
						gap:8px;

						cursor:pointer;
						transition:0.3s;
					}

					#signUpBtn:hover{
						background:#6c4cff;
					}

					#signUpBtn img{
						width:32px;
						height:32px;
						border-radius:50%;
					}
					.profile-menu{
					position:absolute;
					top:70px;
					right:20px;

					background:#1f1f35;
					border:1px solid #6c4cff;
					border-radius:10px;

					width:180px;

					display:none;

					overflow:hidden;
					box-shadow:0 10px 25px rgba(0,0,0,.4);
				}

				.profile-menu a{
					display:block;
					padding:12px 15px;
					color:white;
					text-decoration:none;
				}

				.profile-menu a:hover{
					background:#6c4cff;
				}
				.profile-box{
				position:relative;
				display:inline-block;
			}

				#signUpBtn{

					display:flex;
					align-items:center;
					gap:10px;

					background:#20202b;

					color:white;

					border:none;

					border-radius:12px;

					padding:10px 15px;

					cursor:pointer;

					transition:.25s;
				}

				#signUpBtn:hover{

					background:#2e2e42;

				}

				#signUpBtn img{

					width:38px;

					height:38px;

					border-radius:50%;

				}

				.profile-menu{

					display:none;

					position:absolute;

					top:60px;

					right:0;

					width:230px;

					background:#1d1d1d;

					border-radius:15px;

					overflow:hidden;

					box-shadow:0 12px 35px rgba(0,0,0,.45);

				}

				.profile-menu a{

					display:block;

					padding:14px 18px;

					color:white;

					text-decoration:none;

					transition:.25s;

				}

				.profile-menu a:hover{

					background:#6c4cff;

				}

				.profile-menu hr{

					border:none;

					border-top:1px solid #333;

				}
				.show{

				display:block;

			}
				</style>
			</meta>
		</meta>
	</head>

	<body>

		<header>
			<nav>
				<a href="index.html" class="logo">
					🎮 Iron Fox Studio

				</a>


				<div class="menu">

					<a href="HTMLPage2.html">Games</a>
					<a href="About.html">About</a>
					<a href="Contacts.html">Contacts</a>
				</div>
					<div class="profile-box">

				<button id="signUpBtn" onclick="signUp()">
					Sign Up
				</button>

				<div id="profileMenu" class="profile-menu">

					<a href="profile.html">👤 My Profile</a>

					<a href="settings.html">⚙ Settings</a>

					<hr>

					<a href="#" id="logoutBtn">🚪 Sign Out</a>

				</div>
			</nav>
		</header>
		
		<section class="contacts">
			<h2>Contact Us</h2>

			<div class="contact-container">

				<div class="contact-card">
					<h3>📧 Gmail</h3>
					<p>yusufyurdamov@gmail.com</p>
					<a href="https://mail.google.com/mail/u/0/#inbox" class="contact-btn">
						Send Email
					</a>
				</div>

				<div class="contact-card">
					<h3>💬 Telegram</h3>
					<p>@voiceframebot</p>
					<a href="https://t.me/voiceframebot" class="contact-btn" target="_blank">
						Open Telegram
					</a>
				</div>

			</div>
		</section>


		<footer>
			© 2026 Iron Fox Studio
		</footer>

	</body>
	<script type="module" src="Firebase.js"></script>
</html>
